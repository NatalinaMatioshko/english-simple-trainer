<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />

    <title>English Simple Trainer</title>
    <link rel="icon" type="image/svg+xml" href="/english-simple-trainer/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Fraunces:wght@700&display=swap"
      rel="stylesheet"
    />
    <!--
      Restore URL encoded by public/404.html after GitHub Pages redirect.
      Must run before React boots so the router sees the correct path.
    -->
    <script>
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function (s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location));
    </script>
    <script type="module" crossorigin src="/english-simple-trainer/assets/index-DeFN7SIU.js"></script>
    <link rel="stylesheet" crossorigin href="/english-simple-trainer/assets/index-DCYLvynh.css">
  </head>

  </body>
</html>
